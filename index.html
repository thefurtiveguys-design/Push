<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Visualizer - Visualisez n'importe quel repo public</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e1e1e6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        /* Search Bar */
        .search-section {
            background: #0f0f17;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #2a2a35;
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            background: #1a1a24;
            border: 2px solid #2a2a35;
            border-radius: 12px;
            padding: 15px 20px;
            color: #e1e1e6;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 0 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .examples {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .example-tag {
            background: #1a1a24;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #2a2a35;
        }

        .example-tag:hover {
            background: #667eea;
            border-color: #667eea;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 60px;
            background: #0f0f17;
            border-radius: 20px;
            border: 1px solid #2a2a35;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a35;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Repo Info */
        .repo-info {
            background: #0f0f17;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #2a2a35;
        }

        .repo-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .repo-name {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }

        .repo-stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #88889b;
        }

        .repo-description {
            color: #c9c9d5;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.6;
        }

        .repo-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding-top: 20px;
            border-top: 1px solid #2a2a35;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #88889b;
            font-size: 14px;
        }

        /* File Explorer */
        .file-explorer {
            background: #0f0f17;
            border-radius: 20px;
            border: 1px solid #2a2a35;
            overflow: hidden;
        }

        .explorer-header {
            background: #1a1a24;
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a35;
            font-weight: 600;
        }

        .breadcrumb {
            padding: 15px 20px;
            background: #0f0f17;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .breadcrumb-item {
            color: #88889b;
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb-item:hover {
            color: #667eea;
        }

        .files-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a35;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-item:hover {
            background: #1a1a24;
        }

        .file-icon {
            width: 20px;
            color: #88889b;
        }

        .file-name {
            flex: 1;
            font-size: 14px;
        }

        .file-size {
            color: #88889b;
            font-size: 12px;
        }

        /* File Content */
        .file-content {
            background: #0f0f17;
            border-radius: 20px;
            border: 1px solid #2a2a35;
            overflow: hidden;
            margin-top: 20px;
        }

        .content-header {
            background: #1a1a24;
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a35;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-body {
            padding: 20px;
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
        }

        .content-body pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Error */
        .error {
            background: rgba(245, 101, 101, 0.1);
            border: 1px solid #f56565;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: #f56565;
        }

        .hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .repo-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fab fa-github"></i> 
                GitHub Visualizer
            </h1>
            <p>Visualisez n'importe quel repository public GitHub instantanément</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="repoInput" placeholder="ex: facebook/react, vuejs/vue, tailwindlabs/tailwindcss" value="facebook/react">
                <button class="search-btn" onclick="loadRepository()">
                    <i class="fas fa-search"></i> Visualiser
                </button>
            </div>
            <div class="examples">
                <span class="example-tag" onclick="quickLoad('facebook/react')">📱 facebook/react</span>
                <span class="example-tag" onclick="quickLoad('vuejs/vue')">🟢 vuejs/vue</span>
                <span class="example-tag" onclick="quickLoad('vercel/next.js')">▲ vercel/next.js</span>
                <span class="example-tag" onclick="quickLoad('tailwindlabs/tailwindcss')">🎨 tailwindlabs/tailwindcss</span>
                <span class="example-tag" onclick="quickLoad('nodejs/node')">🟢 nodejs/node</span>
                <span class="example-tag" onclick="quickLoad('microsoft/vscode')">💻 microsoft/vscode</span>
            </div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>Chargement du repository...</span>
        </div>

        <div id="error" class="error hidden"></div>

        <div id="content" class="hidden">
            <div class="repo-info" id="repoInfo"></div>
            <div class="file-explorer">
                <div class="explorer-header">
                    <i class="fas fa-folder-open"></i> Explorateur de fichiers
                </div>
                <div class="breadcrumb" id="breadcrumb"></div>
                <div class="files-list" id="filesList"></div>
            </div>
            <div id="fileContent" class="file-content hidden">
                <div class="content-header">
                    <span><i class="fas fa-file-code"></i> <span id="currentFileName"></span></span>
                    <button class="search-btn" style="padding: 6px 12px; font-size: 12px;" onclick="closeFileView()">
                        <i class="fas fa-times"></i> Fermer
                    </button>
                </div>
                <div class="content-body" id="fileContentBody">
                    <pre></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentRepo = '';
        let currentPath = '';
        let currentSha = '';

        // Charger un repository
        async function loadRepository() {
            const repoInput = document.getElementById('repoInput').value.trim();
            if (!repoInput) {
                showError('Veuillez entrer un nom de repository (ex: facebook/react)');
                return;
            }

            currentRepo = repoInput;
            currentPath = '';
            
            showLoading();
            hideError();
            
            try {
                // Récupérer les infos du repo
                const repoInfo = await fetchGitHubAPI(`/repos/${repoInput}`);
                
                if (!repoInfo.ok) {
                    throw new Error(`Repository non trouvé: ${repoInput}`);
                }
                
                const repoData = await repoInfo.json();
                
                // Récupérer le contenu du dossier racine
                const contents = await fetchGitHubAPI(`/repos/${repoInput}/contents/`);
                const filesData = await contents.json();
                
                displayRepoInfo(repoData);
                displayFiles(filesData, '');
                
                hideLoading();
                showContent();
                
            } catch (error) {
                hideLoading();
                showError(error.message);
                console.error('Erreur:', error);
            }
        }

        // Appel à l'API GitHub
        async function fetchGitHubAPI(endpoint) {
            const response = await fetch(`https://api.github.com${endpoint}`, {
                headers: {
                    'Accept': 'application/vnd.github.v3+json',
                    // Pas besoin de token pour les repos publics, mais c'est plus fiable avec
                    // 'Authorization': 'token VOTRE_TOKEN' 
                }
            });
            return response;
        }

        // Afficher les infos du repository
        function displayRepoInfo(data) {
            const date = new Date(data.updated_at).toLocaleDateString('fr-FR');
            
            document.getElementById('repoInfo').innerHTML = `
                <div class="repo-header">
                    <div>
                        <div class="repo-name">
                            <i class="fab fa-github"></i> ${data.full_name}
                        </div>
                        <div class="repo-stats" style="margin-top: 10px;">
                            <div class="stat">
                                <i class="fas fa-star"></i> ${formatNumber(data.stargazers_count)} stars
                            </div>
                            <div class="stat">
                                <i class="fas fa-code-branch"></i> ${formatNumber(data.forks_count)} forks
                            </div>
                            <div class="stat">
                                <i class="fas fa-eye"></i> ${formatNumber(data.watchers_count)} watchers
                            </div>
                        </div>
                    </div>
                    <a href="${data.html_url}" target="_blank" class="search-btn" style="display: inline-block; padding: 10px 20px; text-decoration: none;">
                        <i class="fab fa-github"></i> Voir sur GitHub
                    </a>
                </div>
                <div class="repo-description">
                    ${data.description || 'Aucune description disponible'}
                </div>
                <div class="repo-meta">
                    <div class="meta-item">
                        <i class="fas fa-calendar"></i> Dernière mise à jour: ${date}
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-code"></i> Langage principal: ${data.language || 'Non spécifié'}
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-file-alt"></i> Licence: ${data.license?.name || 'Non spécifiée'}
                    </div>
                </div>
            `;
        }

        // Afficher les fichiers et dossiers
        function displayFiles(files, path) {
            const filesList = document.getElementById('filesList');
            const breadcrumb = document.getElementById('breadcrumb');
            
            // Filtrer et trier: dossiers d'abord, puis fichiers
            const sortedFiles = files.sort((a, b) => {
                if (a.type === 'dir' && b.type !== 'dir') return -1;
                if (a.type !== 'dir' && b.type === 'dir') return 1;
                return a.name.localeCompare(b.name);
            });
            
            filesList.innerHTML = sortedFiles.map(file => `
                <div class="file-item" onclick="openItem('${file.path}', '${file.type}', '${file.sha}')">
                    <div class="file-icon">
                        <i class="fas ${getFileIcon(file.name, file.type)}"></i>
                    </div>
                    <div class="file-name">${file.name}</div>
                    <div class="file-size">${file.size ? formatFileSize(file.size) : ''}</div>
                </div>
            `).join('');
            
            // Mettre à jour le breadcrumb
            const pathParts = path.split('/').filter(p => p);
            breadcrumb.innerHTML = `
                <div class="breadcrumb-item" onclick="navigateToRoot()">
                    <i class="fas fa-home"></i> ${currentRepo}
                </div>
                ${pathParts.map((part, index) => `
                    <i class="fas fa-chevron-right" style="color: #88889b; font-size: 12px;"></i>
                    <div class="breadcrumb-item" onclick="navigateToPath('${pathParts.slice(0, index + 1).join('/')}')">
                        ${part}
                    </div>
                `).join('')}
            `;
            
            currentPath = path;
        }

        // Ouvrir un fichier ou dossier
        async function openItem(path, type, sha) {
            if (type === 'dir') {
                // Naviguer dans le dossier
                const response = await fetchGitHubAPI(`/repos/${currentRepo}/contents/${path}`);
                const data = await response.json();
                displayFiles(data, path);
            } else {
                // Afficher le contenu du fichier
                await showFileContent(path);
            }
        }

        // Afficher le contenu d'un fichier
        async function showFileContent(filePath) {
            showLoading();
            
            try {
                const response = await fetchGitHubAPI(`/repos/${currentRepo}/contents/${filePath}`);
                const data = await response.json();
                
                if (data.encoding === 'base64') {
                    // Décoder le contenu base64
                    const content = atob(data.content);
                    
                    document.getElementById('currentFileName').textContent = filePath;
                    const contentBody = document.getElementById('fileContentBody');
                    
                    // Détecter si c'est une image
                    if (data.name.match(/\.(jpg|jpeg|png|gif|svg)$/i)) {
                        contentBody.innerHTML = `<img src="data:image/${data.name.split('.').pop()};base64,${data.content}" style="max-width: 100%;">`;
                    } else {
                        // Formater selon l'extension
                        const language = getLanguageFromExtension(data.name);
                        contentBody.innerHTML = `<pre><code class="language-${language}">${escapeHtml(content)}</code></pre>`;
                    }
                    
                    document.getElementById('fileContent').classList.remove('hidden');
                }
                
                hideLoading();
            } catch (error) {
                hideLoading();
                showError(`Impossible de lire le fichier: ${error.message}`);
            }
        }

        function closeFileView() {
            document.getElementById('fileContent').classList.add('hidden');
        }

        function navigateToRoot() {
            refreshCurrentFolder();
        }

        async function navigateToPath(path) {
            const response = await fetchGitHubAPI(`/repos/${currentRepo}/contents/${path}`);
            const data = await response.json();
            displayFiles(data, path);
        }

        async function refreshCurrentFolder() {
            const response = await fetchGitHubAPI(`/repos/${currentRepo}/contents/${currentPath}`);
            const data = await response.json();
            displayFiles(data, currentPath);
        }

        function quickLoad(repo) {
            document.getElementById('repoInput').value = repo;
            loadRepository();
        }

        // Utilitaires
        function getFileIcon(filename, type) {
            if (type === 'dir') return 'fa-folder';
            
            const ext = filename.split('.').pop();
            const icons = {
                js: 'fa-js',
                jsx: 'fa-react',
                ts: 'fa-code',
                tsx: 'fa-react',
                html: 'fa-html5',
                css: 'fa-css3',
                json: 'fa-code',
                md: 'fa-markdown',
                py: 'fa-python',
                java: 'fa-java',
                php: 'fa-php',
                rb: 'fa-gem',
                go: 'fa-code',
                rs: 'fa-code',
                vue: 'fa-vuejs',
                svg: 'fa-image',
                png: 'fa-image',
                jpg: 'fa-image',
                gif: 'fa-image'
            };
            return icons[ext] || 'fa-file';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }

        function getLanguageFromExtension(filename) {
            const ext = filename.split('.').pop();
            const langs = {
                js: 'javascript',
                jsx: 'javascript',
                ts: 'typescript',
                tsx: 'typescript',
                html: 'html',
                css: 'css',
                json: 'json',
                py: 'python',
                java: 'java',
                md: 'markdown'
            };
            return langs[ext] || 'plaintext';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('content').classList.add('hidden');
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }

        function showContent() {
            document.getElementById('content').classList.remove('hidden');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.innerHTML = `
                <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 15px;"></i>
                <h3>Erreur</h3>
                <p>${message}</p>
            `;
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error').classList.add('hidden');
        }

        // Charger le repo par défaut au démarrage
        document.addEventListener('DOMContentLoaded', () => {
            loadRepository();
        });
    </script>
</body>
</html>
